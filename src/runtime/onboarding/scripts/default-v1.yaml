# Default v1 onboarding script (Epic 14 Phase A).
#
# Editable by non-engineers. The script-loader validates this file at
# boot via Zod; a bad edit fails the supervisor with a precise pointer
# rather than a mid-conversation surprise.
#
# Branches:
#   - email_agent_branch: an Agent that watches an inbox
#   - project_agent_branch: an Agent attached to a specific build / project
#   - ops_agent_branch: an Agent for operational dashboards / triage
#   - freeform_branch: catch-all when keyword routing does not match

script_schema_version: 1
name: default-v1

opening:
  id: opening
  text: |
    What kind of Agent do you want to spawn? In a sentence or two,
    describe what it should do for you.
  expects: free_form
  intent_tag: opening_purpose

routing:
  - if_keywords: [email, inbox, gmail, mail, messages]
    next_branch: email_agent_branch
  - if_keywords: [project, build, develop, code, repository, repo]
    next_branch: project_agent_branch
  - if_keywords: [ops, operations, dashboard, alert, monitor, oncall]
    next_branch: ops_agent_branch

default_branch: freeform_branch

branches:
  - id: email_agent_branch
    description: Email-watching Agent
    questions:
      - id: agent_name
        text: |
          Give your Agent a short lowercase name (letters, digits, dashes).
          This becomes its directory name and its display name in the pub.
        expects: name
        intent_tag: agent_name
      - id: email_account
        text: Which email account should it watch?
        expects: email
        intent_tag: tool_email_account
      - id: triage_default
        text: |
          What should it do with incoming email by default — triage, summarize,
          or draft replies?
        expects: free_form
        intent_tag: behavior_email_default
      - id: cadence
        text: |
          How often should it check, and what's its quiet-hours window?
          (Free-form; the system will translate to a schedule.)
        expects: free_form
        intent_tag: cadence_email

  - id: project_agent_branch
    description: Project / build Agent
    questions:
      - id: agent_name
        text: |
          Give your Agent a short lowercase name (letters, digits, dashes).
        expects: name
        intent_tag: agent_name
      - id: project_path
        text: |
          What project does it work on? Filesystem path or repository URL.
        expects: free_form
        intent_tag: tool_project_path
      - id: lane
        text: |
          What's its lane — review code, write specs, run tests, ship PRs,
          something else? Free-form.
        expects: free_form
        intent_tag: behavior_project_lane
      - id: cadence
        text: |
          What's its working rhythm — always-on, weekday-only, on-demand,
          something else?
        expects: free_form
        intent_tag: cadence_project

  - id: ops_agent_branch
    description: Operations / monitoring Agent
    questions:
      - id: agent_name
        text: |
          Give your Agent a short lowercase name (letters, digits, dashes).
        expects: name
        intent_tag: agent_name
      - id: dashboards
        text: |
          What does it watch — dashboards, alerts, log streams, metrics?
        expects: free_form
        intent_tag: tool_ops_target
      - id: escalation
        text: |
          When should it escalate to you? "Critical only", "important and up",
          or "anything that looks weird"?
        expects: free_form
        intent_tag: behavior_ops_escalation
      - id: cadence
        text: |
          What's the polling cadence — every minute, every five minutes,
          on-demand only?
        expects: free_form
        intent_tag: cadence_ops

  - id: freeform_branch
    description: Catch-all branch when keyword routing does not match
    questions:
      - id: agent_name
        text: |
          Give your Agent a short lowercase name (letters, digits, dashes).
        expects: name
        intent_tag: agent_name
      - id: tools_needed
        text: |
          What tools should it have access to? Free-form list (e.g. "GitHub,
          Slack, my filesystem"). The system will suggest matching MCP servers.
        expects: free_form
        intent_tag: tools_freeform
      - id: cadence_freeform
        text: |
          What's its rhythm — always-on, scheduled, event-driven, on-demand?
        expects: free_form
        intent_tag: cadence_freeform
