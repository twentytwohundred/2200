# Dependabot config for the 2200 runtime repo.
#
# Weekly updates so the toolchain stays current without flooding the PR
# queue. Grouped updates reduce noise: one PR per ecosystem per week
# instead of one PR per dependency.

version: 2
updates:
  # Node / pnpm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/Chicago'
    open-pull-requests-limit: 5
    labels:
      - 'tooling'
    commit-message:
      prefix: 'deps'
      include: 'scope'
    groups:
      # Group all minor and patch updates into one PR per week.
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - 'minor'
          - 'patch'
      # Major updates are NOT grouped: dependabot opens one PR per package
      # so each major bump can be evaluated and tested on its own merits.
    ignore:
      # @types/node tracks engines.node minimum (currently 22). Don't chase
      # majors above the engines floor; bump deliberately when engines moves.
      - dependency-name: '@types/node'
        update-types:
          - 'version-update:semver-major'
      # @vitejs/plugin-react v6 requires vite ^8.0.0; we're on vite 5. The
      # plugin major is coupled to a vite-ecosystem migration that we'll do
      # as its own epic, not as a dependabot bump. Re-evaluate when we
      # explicitly plan the vite 5 -> 8 jump.
      - dependency-name: '@vitejs/plugin-react'
        update-types:
          - 'version-update:semver-major'

  # GitHub Actions in workflow files
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/Chicago'
    open-pull-requests-limit: 3
    labels:
      - 'tooling'
    commit-message:
      prefix: 'ci'
