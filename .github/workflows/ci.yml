name: CI

on:
  push:
    branches: [main]
  # Trigger on every pull request regardless of base branch so stacked PRs
  # (PRs whose base is another feature branch, not main) get CI coverage.
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Type-check, lint, format, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        # Version is read from package.json's "packageManager" field, single
        # source of truth. Do not pass `version:` here.

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      # Build before Test so the chaos test (which spawns the bundled
      # dist/runtime/agent/bootstrap.js as a real child process) finds
      # the artifact. Local `pnpm verify` runs them in this same order
      # via package.json's verify script ... CI just needs to match.
      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Web app verify (typecheck + lint + format + test + build)
        run: pnpm --filter @twentytwohundred/web verify

      # The web app's tokens.css + theme CSS files are generated from
      # apps/web/src/tokens/source/tokens.json. Both source and generated
      # are committed; this step regenerates and fails if the committed
      # output drifts from the source. Catches a stale-source bump.
      - name: Web tokens drift check
        run: |
          pnpm --filter @twentytwohundred/web run generate:tokens
          if ! git diff --exit-code apps/web/src/tokens/generated/; then
            echo "::error::Generated token CSS does not match source. Run 'pnpm --filter @twentytwohundred/web run generate:tokens' locally and commit the result."
            exit 1
          fi
