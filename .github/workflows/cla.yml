name: CLA Assistant

# Triggered on every PR open / sync / close and on issue-comment events
# (the latter is how contributors sign by posting the sign-off phrase).
#
# What this workflow enforces:
#   - Every external contributor to 2200 must sign the Contributor
#     License Agreement before their PR can be merged.
#   - Signatures are stored in our own infrastructure: a JSON file on
#     a dedicated `cla-signatures` branch inside this repo. No
#     third-party service holds the record.
#   - The owner (douglashardman) and bots (dependabot) are allowlisted
#     and skip the check.
#
# IMPORTANT: this workflow sets a status check on each PR but does
# NOT block merge by itself. To enforce the block, configure branch
# protection on `main` to require the "CLA Assistant" status check.
# See CONTRIBUTING.md for the exact one-time setup step.
#
# Action pinned to v2.6.1 (the current release at install time). When
# bumping, scan the changelog for behavior changes in the comment /
# allowlist / branch semantics first.
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: 'https://github.com/twentytwohundred/2200/blob/main/CLA.md'
          path-to-signatures: 'cla.json'
          branch: 'cla-signatures'
          allowlist: 'douglashardman,dependabot*'
