<!doctype html>
<html lang="en" class="theme-dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>2200</title>

    <!--
      Live favicon: data-URL placeholder. LiveFavicon (apps/web/src/favicon)
      mounts on boot, draws a 32×32 canvas every animation frame, and
      writes the canvas back to this link as a PNG data URL. The color
      reflects fleet state (ok / warn / err / off). See
      wiki/design/live-favicon.md for the brief.
    -->
    <link rel="icon" id="dyn-favicon" href="data:," />

    <!--
      Sans = Switzer (Fontshare CDN); mono = JetBrains Mono (Google Fonts).
      Token files reference these family names. Loading both before main.css
      so the FOUT lasts a single paint instead of cascading through every
      typography rule. Self-host both when production hardening lands per
      design-system-v1.1 §3 Option B.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://api.fontshare.com/v2/css?f[]=switzer@300,400,500,600,700,800&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
